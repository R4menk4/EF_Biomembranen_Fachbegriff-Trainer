<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biomembranen-Karteikarten</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <button class="brand-button" type="button" data-action="menu" aria-label="Zum Startmenü">
        <span>Biologie Grundkurs</span>
        <strong>Biomembranen-Karteikarten</strong>
      </button>
      <nav class="header-actions" aria-label="Hauptnavigation">
        <button class="ghost-button" type="button" data-action="menu">Menü</button>
        <button class="primary-button" type="button" data-action="progress">Fortschritt</button>
      </nav>
    </header>

    <main id="app" class="app-main" tabindex="-1">
      <section class="loading-view" aria-live="polite">
        <p>Fachbegriffe werden geladen...</p>
      </section>
    </main>
  </div>

  <template id="menu-template">
    <section class="menu-view view-panel">
      <div class="intro-block">
        <p class="eyebrow">Biologie Grundkurs</p>
        <h1>Biomembranen-Karteikarten</h1>
        <p class="intro-text">
          Wähle ein fachliches Thema oder deinen persönlichen Lernstand. Dein Lernstand wird nur auf diesem Gerät und in diesem Browser gespeichert.
        </p>
      </div>

      <div class="selection-grid">
        <section class="selection-section" aria-labelledby="topics-heading">
          <div class="section-heading">
            <h2 id="topics-heading">Fachliche Themen</h2>
            <p id="topics-count"></p>
          </div>
          <div id="topic-buttons" class="button-grid"></div>
        </section>

        <section class="selection-section" aria-labelledby="levels-heading">
          <div class="section-heading">
            <h2 id="levels-heading">Persönlicher Lernstand</h2>
            <p>Nach deiner letzten Selbsteinschätzung</p>
          </div>
          <div id="level-buttons" class="button-grid compact"></div>
        </section>
      </div>
    </section>
  </template>

  <template id="study-template">
    <section class="study-view view-panel">
      <div class="study-topline">
        <div>
          <p id="selection-type" class="eyebrow"></p>
          <h1 id="selection-title"></h1>
        </div>
        <p id="card-counter" class="counter-pill" aria-live="polite"></p>
      </div>

      <div class="study-toolbar" aria-label="Lerneinstellungen">
        <fieldset class="mode-toggle">
          <legend>Abfragemodus</legend>
          <label>
            <input type="radio" name="study-mode" value="term" checked>
            <span>Fachbegriff zuerst</span>
          </label>
          <label>
            <input type="radio" name="study-mode" value="definition">
            <span>Definition zuerst</span>
          </label>
        </fieldset>
        <div class="toolbar-buttons">
          <button class="ghost-button" type="button" data-action="shuffle">Neu mischen</button>
          <button class="ghost-button" type="button" data-action="menu">Zum Menü</button>
        </div>
      </div>

      <div id="study-content"></div>
    </section>
  </template>

  <template id="progress-template">
    <section class="progress-view view-panel">
      <div class="progress-heading">
        <div>
          <p class="eyebrow">Lernstand</p>
          <h1>Fortschrittsübersicht</h1>
        </div>
        <button class="ghost-button" type="button" data-action="menu">Zum Menü</button>
      </div>

      <section aria-labelledby="total-progress-heading">
        <h2 id="total-progress-heading">Gesamtübersicht</h2>
        <div id="overall-progress" class="progress-grid"></div>
      </section>

      <section aria-labelledby="topic-progress-heading">
        <h2 id="topic-progress-heading">Fortschritt nach Themen</h2>
        <div id="topic-progress" class="topic-progress-grid"></div>
      </section>

      <div class="reset-row">
        <button class="danger-button" type="button" data-action="reset-progress">Lernstand zurücksetzen</button>
      </div>
    </section>
  </template>

  <script src="script.js?v=3"></script>
</body>
</html>
